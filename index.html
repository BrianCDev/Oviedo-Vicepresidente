<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>

:root{
    --card:#ffffff;
    --text:#0b1c36;
    --accent:#ffb200;
}

*{
    box-sizing: border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
        radial-gradient(1200px 600px at 20% 10%, #1b57a8 0%, #0b2b5b 45%, #071a36 100%),
        radial-gradient(circle at 1px 1px, rgba(255,255,255,0.12) 1px, rgba(0,0,0,0) 1px);
    background-size: auto, 24px 24px;
    color:var(--text);
    text-align:center;
    font-family:Montserrat, Arial, sans-serif;
}

.app{
    width:min(940px, 94vw);
    background:linear-gradient(180deg, #ffffff 0%, #f6f8ff 100%);
    border-radius:24px;
    padding:clamp(16px, 3vw, 28px) clamp(16px, 3vw, 28px) clamp(22px, 3.5vw, 34px);
    box-shadow:0 24px 60px rgba(4, 18, 38, 0.35);
    overflow:hidden;
}

.titulo{
    margin:4px 0 18px;
    font-size:clamp(22px, 3.2vw, 32px);
    letter-spacing:0.4px;
    font-weight:800;
}

.titulo .icon{
    display:inline-block;
    margin-right:8px;
    transform:translateY(1px);
}

.subtitulo{
    margin:-10px 0 16px;
    font-size:clamp(12px, 2.1vw, 15px);
    color:#5b6b88;
}

.controls{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

.controls label{
    position:absolute;
    left:-9999px;
}

.controls input{
    padding:12px 14px;
    font-size:16px;
    border-radius:12px;
    border:2px solid #e2e6ef;
    min-width:220px;
    outline:none;
    transition:border-color 0.2s ease, box-shadow 0.2s ease;
}

.controls input:focus{
    border-color:#6aa3ff;
    box-shadow:0 0 0 4px rgba(106, 163, 255, 0.2);
}

.controls button{
    padding:12px 18px;
    font-size:16px;
    border-radius:12px;
    border:0;
    background:var(--accent);
    color:#1f1f1f;
    font-weight:bold;
    cursor:pointer;
    transition:transform 0.15s ease, box-shadow 0.2s ease;
    position:relative;
    overflow:hidden;
}

.controls .icon-btn{
    width:46px;
    height:46px;
    padding:0;
    background:#f1f5ff;
    border-radius:12px;
}

.controls .icon-btn::after{
    display:none;
}

.controls .icon-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 8px 18px rgba(31, 57, 102, 0.18);
    background:#e7eefc;
}

.controls .icon-btn svg{
    width:22px;
    height:22px;
    fill:#13294b;
}

.controls button:hover{
    transform:translateY(-1px);
    box-shadow:0 10px 20px rgba(255, 178, 0, 0.25);
}

.controls button::after{
    content:"";
    position:absolute;
    top:-50%;
    left:-30%;
    width:40%;
    height:200%;
    background:rgba(255,255,255,0.35);
    transform:rotate(20deg);
    transition:transform 0.5s ease;
}

.controls button:hover::after{
    transform:translateX(240%) rotate(20deg);
}

.contenedor{
    position:relative;
    width:100%;
    max-width:640px;
    margin:22px auto 0;
    border-radius:18px;
    overflow:hidden;
}

.counter{
    margin-top:14px;
    font-size:clamp(13px, 2.1vw, 15px);
    color:#5b6b88;
}

.contenedor img{
    width:100%;
    display:block;
}

.nombre{
    position:absolute;
    top:var(--name-top, 20%);
    width:100%;
    font-size:var(--name-size, 56px);
    font-weight:800;
    font-family:Montserrat, Arial, sans-serif;
    color:white;
    letter-spacing:1px;
    animation:fadePop 0.25s ease;
}

.nombre.animar{
    animation:popTexto 0.35s ease;
}

.destello{
    position:absolute;
    inset:-40%;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0) 60%);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.4s ease;
}

.overlay{
    position:absolute;
    inset:0;
    border-radius:18px;
    background:linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.05) 40%, rgba(0,0,0,0.2));
    pointer-events:none;
}

@keyframes fadePop{
    from{
        opacity:0;
        transform:scale(0.98);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes popTexto{
    0%{transform:scale(0.96);}
    60%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

</style>
</head>

<body>

<div class="app">

    <h2 class="titulo">SUMEMOS JUNTOS</h2>
    <div class="subtitulo">Personaliza tu imagen en un solo clic</div>

    <div class="controls">
        <label for="nombre">Tu nombre</label>
        <input id="nombre" placeholder="Tu nombre" autocomplete="off">
        <button onclick="generar()">Generar</button>
        <button onclick="descargar()">Descargar</button>
        <button class="icon-btn" type="button" aria-label="Compartir en historias de Instagram" onclick="compartirInstagram()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 3h10a4 4 0 0 1 4 4v10a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V7a4 4 0 0 1 4-4zm10 2H7a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm-5 3.5A4.5 4.5 0 1 1 7.5 13 4.5 4.5 0 0 1 12 8.5zm0 2A2.5 2.5 0 1 0 14.5 13 2.5 2.5 0 0 0 12 10.5zm4.75-3.75a1 1 0 1 1-1 1 1 1 0 0 1 1-1z"/>
            </svg>
        </button>
        <button class="icon-btn" type="button" aria-label="Compartir en Facebook" onclick="compartirFacebook()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M13.5 9.5V8a2 2 0 0 1 2-2h2V3h-2.5A4.5 4.5 0 0 0 10.5 7.5V9.5H8v3h2.5V21h3v-8.5H16l.5-3z"/>
            </svg>
        </button>
    </div>

    <div class="contenedor">
        <img src="imagen-campaña.png" alt="Imagen de campaña">
        <div class="destello" id="destello"></div>
        <div class="overlay"></div>
        <div class="nombre" id="nombreTexto">CAMILO</div>
    </div>
    <div class="counter" aria-live="polite">
        Descargas: <span id="downloadCount">0</span>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>

function generar(){
    let nombre = document.getElementById("nombre").value.trim();
    if (nombre === "") {
        nombre = "CAMILO";
    }
    document.getElementById("nombreTexto").innerText = nombre.toUpperCase();
    activarDestello();
    animarTexto();
}

async function crearImagen(){
    const contenedor = document.querySelector(".contenedor");
    if (!contenedor) return null;
    try{
        const canvas = await html2canvas(contenedor, {useCORS:true, scale:3, backgroundColor:null});
        return canvas;
    }catch(err){
        console.error(err);
        alert("No se pudo generar la imagen. Intenta abrirlo desde un servidor local.");
        return null;
    }
}

async function descargar(){
    const canvas = await crearImagen();
    if (!canvas) return;
    const link = document.createElement("a");
    link.download = "campana.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
    incrementarDescargas();
}

async function compartirInstagram(){
    const canvas = await crearImagen();
    if (!canvas) return;
    if (!navigator.canShare || !navigator.share){
        alert("Para Instagram Stories usa Descargar y comparte desde tu galería.");
        return;
    }
    const blob = await new Promise(r => canvas.toBlob(r, "image/png", 1.0));
    if (!blob) return;
    const file = new File([blob], "campana.png", {type:"image/png"});
    if (!navigator.canShare({files:[file]})){
        alert("Tu navegador no permite compartir archivos. Usa Descargar y comparte desde tu galería.");
        return;
    }
    try{
        await navigator.share({
            files:[file],
            title:"Mi imagen de campaña",
            text:"Historia de Instagram"
        });
    }catch(err){
        console.error(err);
    }
}

function compartirFacebook(){
    const url = encodeURIComponent(window.location.href);
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, "_blank", "noopener,noreferrer");
}

function ajustarTexto(){
    const contenedor = document.querySelector(".contenedor");
    if (!contenedor) return;
    const ancho = contenedor.clientWidth;
    const size = Math.max(24, Math.min(72, Math.round(ancho * 0.10)));
    contenedor.style.setProperty("--name-size", size + "px");
}

function activarDestello(){
    const destello = document.getElementById("destello");
    if (!destello) return;
    destello.style.opacity = "1";
    setTimeout(()=>{ destello.style.opacity = "0"; }, 350);
}

function animarTexto(){
    const el = document.getElementById("nombreTexto");
    if (!el) return;
    el.classList.remove("animar");
    void el.offsetWidth;
    el.classList.add("animar");
}

function incrementarDescargas(){
    const key = "descargasCampana";
    const actual = Number(localStorage.getItem(key) || "0") + 1;
    localStorage.setItem(key, String(actual));
    const label = document.getElementById("downloadCount");
    if (label) label.textContent = String(actual);
}

function cargarDescargas(){
    const key = "descargasCampana";
    const actual = Number(localStorage.getItem(key) || "0");
    const label = document.getElementById("downloadCount");
    if (label) label.textContent = String(actual);
}

window.addEventListener("resize", ajustarTexto);
window.addEventListener("load", ajustarTexto);
window.addEventListener("load", cargarDescargas);
ajustarTexto();

</script>

</body>
</html>
