<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>

:root{
    --bg-1:#050b16;
    --bg-2:#0b1630;
    --bg-3:#0e2a52;
    --glass:rgba(255,255,255,0.08);
    --glass-strong:rgba(255,255,255,0.12);
    --text:#e7f0ff;
    --muted:#a8b6d6;
    --accent:#48f0ff;
    --accent-2:#7c5cff;
    --accent-3:#00ff9d;
}

*{
    box-sizing: border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
        radial-gradient(900px 500px at 15% 10%, #143a72 0%, rgba(20,58,114,0) 60%),
        radial-gradient(900px 500px at 85% 20%, #2a185a 0%, rgba(42,24,90,0) 60%),
        linear-gradient(120deg, var(--bg-1), var(--bg-2), var(--bg-3));
    color:var(--text);
    text-align:center;
    font-family:Montserrat, Arial, sans-serif;
    overflow-x:hidden;
}

.app{
    width:min(980px, 94vw);
    background:
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04)),
        radial-gradient(600px 300px at 10% 0%, rgba(72,240,255,0.15), rgba(72,240,255,0) 60%);
    border-radius:28px;
    padding:clamp(18px, 3.5vw, 32px) clamp(18px, 3.5vw, 32px) clamp(24px, 4vw, 36px);
    box-shadow:
        0 30px 80px rgba(4, 18, 38, 0.55),
        inset 0 0 0 1px rgba(255,255,255,0.08);
    overflow:hidden;
    position:relative;
    backdrop-filter:blur(10px) saturate(140%);
    animation:cardIn 0.6s ease;
}

.app::before,
.app::after{
    content:"";
    position:absolute;
    width:340px;
    height:340px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(124,92,255,0.22) 0%, rgba(124,92,255,0) 70%);
    filter:blur(10px);
    opacity:0.8;
    pointer-events:none;
    animation:floatBlob 12s ease-in-out infinite;
}

.app::before{
    top:-180px;
    right:-120px;
}

.app::after{
    bottom:-200px;
    left:-140px;
    background:radial-gradient(circle, rgba(0,255,157,0.18) 0%, rgba(0,255,157,0) 70%);
    animation-delay:3s;
}

.titulo{
    margin:4px 0 18px;
    font-size:clamp(24px, 3.5vw, 38px);
    letter-spacing:1.4px;
    font-weight:800;
    text-transform:uppercase;
    color:#f7fbff;
    text-shadow:0 0 18px rgba(72,240,255,0.25);
}

.subtitulo{
    margin:-10px 0 16px;
    font-size:clamp(12px, 2.2vw, 15px);
    color:var(--muted);
}

.ayuda{
    margin:-6px 0 16px;
    font-size:clamp(12px, 2.1vw, 14px);
    color:#c7d4ef;
}

.ayuda strong{
    color:#ffffff;
}

.controls{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

.controls label{
    position:absolute;
    left:-9999px;
}

.controls input{
    padding:12px 14px;
    font-size:16px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.14);
    min-width:220px;
    outline:none;
    transition:border-color 0.2s ease, box-shadow 0.2s ease;
    background:rgba(6,10,20,0.55);
    color:var(--text);
}

.controls input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 4px rgba(72, 240, 255, 0.2);
}

.controls button{
    padding:12px 20px;
    font-size:16px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.18);
    background:
        linear-gradient(120deg, rgba(72,240,255,0.95), rgba(124,92,255,0.9)),
        radial-gradient(120px 60px at 15% 10%, rgba(255,255,255,0.35), rgba(255,255,255,0));
    color:#07131f;
    font-weight:800;
    letter-spacing:0.6px;
    cursor:pointer;
    transition:transform 0.18s ease, box-shadow 0.25s ease, filter 0.25s ease;
    position:relative;
    overflow:hidden;
    box-shadow:
        0 12px 30px rgba(72, 240, 255, 0.25),
        inset 0 0 0 1px rgba(255,255,255,0.2);
}

.controls button:disabled{
    opacity:0.55;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
}

.controls button:disabled::after{
    display:none;
}

.controls .icon-btn{
    width:48px;
    height:48px;
    padding:0;
    background:
        radial-gradient(120px 60px at 20% 10%, rgba(255,255,255,0.18), rgba(255,255,255,0) 60%),
        linear-gradient(140deg, rgba(72,240,255,0.2), rgba(124,92,255,0.18));
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.18);
    box-shadow:0 10px 22px rgba(7, 18, 32, 0.35);
}

.controls .icon-btn::after{
    display:none;
}

.controls .icon-btn:hover{
    transform:translateY(-2px) scale(1.02);
    box-shadow:
        0 12px 26px rgba(72, 240, 255, 0.2),
        0 0 12px rgba(124, 92, 255, 0.3);
}

.controls .icon-btn svg{
    width:22px;
    height:22px;
    fill:#e7f0ff;
    filter:drop-shadow(0 0 6px rgba(72,240,255,0.6));
}

.controls button:hover{
    transform:translateY(-2px);
    filter:saturate(120%);
    box-shadow:
        0 18px 36px rgba(124, 92, 255, 0.35),
        0 0 18px rgba(72, 240, 255, 0.35);
}

.controls button:active{
    transform:translateY(0);
    filter:saturate(105%);
}

.controls button::after{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(120px 60px at -10% 50%, rgba(255,255,255,0.5), rgba(255,255,255,0) 60%),
        linear-gradient(120deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 45%, rgba(255,255,255,0) 70%);
    transform:translateX(-120%);
    transition:transform 0.6s ease;
    mix-blend-mode:screen;
}

.controls button:hover::after{
    transform:translateX(120%);
}

.controls button::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:999px;
    padding:2px;
    background:conic-gradient(from 140deg, rgba(72,240,255,0.9), rgba(124,92,255,0.9), rgba(0,255,157,0.8), rgba(72,240,255,0.9));
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    opacity:0;
    transition:opacity 0.3s ease;
    pointer-events:none;
}

.controls button:hover::before{
    opacity:1;
}

.share-hint{
    margin:10px 0 0;
    font-size:clamp(12px, 2.1vw, 14px);
    color:#c7d4ef;
    min-height:18px;
}

.contenedor{
    position:relative;
    width:100%;
    max-width:640px;
    margin:22px auto 0;
    border-radius:0;
    overflow:hidden;
    animation:floatCard 8s ease-in-out infinite;
    box-shadow:0 18px 40px rgba(5, 10, 24, 0.6);
    border:1px solid rgba(255,255,255,0.08);
}

.contenedor::before{
    content:"";
    position:absolute;
    inset:-20%;
    background:radial-gradient(circle at 30% 20%, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 55%);
    opacity:0.6;
    pointer-events:none;
}

.counter{
    margin-top:14px;
    font-size:clamp(13px, 2.1vw, 15px);
    color:var(--muted);
}

.contenedor img{
    width:100%;
    display:block;
}

.nombre{
    position:absolute;
    top:var(--name-top, 19%);
    width:100%;
    font-size:var(--name-size, 56px);
    font-weight:800;
    font-family:Montserrat, Arial, sans-serif;
    color:white;
    letter-spacing:1px;
    animation:fadePop 0.25s ease;
    text-shadow:0 4px 18px rgba(0,0,0,0.45);
}

.nombre.animar{
    animation:popTexto 0.35s ease;
}

.destello{
    position:absolute;
    inset:-40%;
    background:radial-gradient(circle at 30% 30%, rgba(72,240,255,0.35) 0%, rgba(72,240,255,0) 60%);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.4s ease;
}

.overlay{
    position:absolute;
    inset:0;
    border-radius:0;
    background:linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.05) 40%, rgba(0,0,0,0.25));
    pointer-events:none;
}

@keyframes fadePop{
    from{
        opacity:0;
        transform:scale(0.98);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes popTexto{
    0%{transform:scale(0.96);}
    60%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

@keyframes floatBlob{
    0%{transform:translateY(0) translateX(0) scale(1);}
    50%{transform:translateY(12px) translateX(-8px) scale(1.05);}
    100%{transform:translateY(0) translateX(0) scale(1);}
}

@keyframes floatCard{
    0%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
    100%{transform:translateY(0);}
}

@keyframes cardIn{
    from{opacity:0;transform:translateY(8px);}
    to{opacity:1;transform:translateY(0);}
}

@media (prefers-reduced-motion: reduce){
    .app,
    .contenedor{
        animation:none;
    }
}

.capturing .contenedor,
.capturing .nombre{
    animation:none;
    transform:none;
}

</style>
</head>

<body>

<div class="app">

    <h2 class="titulo">SUMEMOS JUNTOS</h2>
    <div class="subtitulo">Crea tu imagen de apoyo, descárgala y compártela para sumar a la campaña.</div>
    <div class="ayuda">1) Escribe tu nombre. 2) Pulsa <strong>Generar</strong>. 3) Descarga o comparte.</div>

    <div class="controls">
        <label for="nombre">Tu nombre</label>
        <input id="nombre" placeholder="Tu nombre" autocomplete="off" maxlength="18">
        <button onclick="generar()">Generar</button>
        <button id="btnDescargar" onclick="descargar()" disabled>Descargar</button>
        <button class="icon-btn" type="button" aria-label="Compartir en historias de Instagram" onclick="compartirInstagram()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 3h10a4 4 0 0 1 4 4v10a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V7a4 4 0 0 1 4-4zm10 2H7a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm-5 3.5A4.5 4.5 0 1 1 7.5 13 4.5 4.5 0 0 1 12 8.5zm0 2A2.5 2.5 0 1 0 14.5 13 2.5 2.5 0 0 0 12 10.5zm4.75-3.75a1 1 0 1 1-1 1 1 1 0 0 1 1-1z"/>
            </svg>
        </button>
        <button class="icon-btn" type="button" aria-label="Compartir en Facebook" onclick="compartirFacebook()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M13.5 9.5V8a2 2 0 0 1 2-2h2V3h-2.5A4.5 4.5 0 0 0 10.5 7.5V9.5H8v3h2.5V21h3v-8.5H16l.5-3z"/>
            </svg>
        </button>
    </div>
    <div class="share-hint" id="shareHint"></div>

    <div class="contenedor">
        <img src="imagen-campaña.png" alt="Imagen de campaña">
        <div class="destello" id="destello"></div>
        <div class="overlay"></div>
        <div class="nombre" id="nombreTexto">TU NOMBRE</div>
    </div>
    <div class="counter" aria-live="polite">
        Descargas: <span id="downloadCount">0</span>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>

function generar(){
    let nombre = document.getElementById("nombre").value.trim();
    nombre = nombre.slice(0, 18);
    if (nombre === "") {
        nombre = "CAMILO";
    }
    document.getElementById("nombreTexto").innerText = nombre.toUpperCase();
    activarDestello();
    animarTexto();
    habilitarDescarga(true);
    ajustarTexto();
}

async function crearImagen(){
    const contenedor = document.querySelector(".contenedor");
    if (!contenedor) return null;
    try{
        document.body.classList.add("capturing");
        if (document.fonts && document.fonts.ready) {
            await document.fonts.ready;
        }
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
        const escala = Math.min(5, Math.max(2, window.devicePixelRatio || 2));
        const canvas = await html2canvas(contenedor, {useCORS:true, scale:escala, backgroundColor:null});
        document.body.classList.remove("capturing");
        return canvas;
    }catch(err){
        console.error(err);
        alert("No se pudo generar la imagen. Intenta abrirlo desde un servidor local.");
        document.body.classList.remove("capturing");
        return null;
    }
}

async function descargar(){
    const canvas = await crearImagen();
    if (!canvas) return;
    const link = document.createElement("a");
    link.download = "campana.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
    incrementarDescargas();
}

function getDevice(){
    const ua = navigator.userAgent || "";
    if (/android/i.test(ua)) return "android";
    if (/iphone|ipad|ipod/i.test(ua)) return "ios";
    return "pc";
}

function setShareHint(msg){
    const el = document.getElementById("shareHint");
    if (!el) return;
    el.textContent = msg || "";
}

async function compartirInstagram(){
    const canvas = await crearImagen();
    if (!canvas) return;
    const device = getDevice();
    setShareHint("");
    if (!navigator.canShare || !navigator.share){
        descargar();
        if (device === "android") {
            setShareHint("En Android: abre Instagram, crea una historia y elige la imagen descargada.");
        } else if (device === "ios") {
            setShareHint("En iPhone: abre Fotos, comparte y elige Instagram Stories.");
        } else {
            setShareHint("En PC: descarga y comparte desde tu celular.");
        }
        return;
    }
    const blob = await new Promise(r => canvas.toBlob(r, "image/png", 1.0));
    if (!blob) return;
    const file = new File([blob], "paloma-oviedo.png", {type:"image/png"});
    if (!navigator.canShare({files:[file]})){
        descargar();
        if (device === "android") {
            setShareHint("En Android: abre Instagram, crea una historia y elige la imagen descargada.");
        } else if (device === "ios") {
            setShareHint("En iPhone: abre Fotos, comparte y elige Instagram Stories.");
        } else {
            setShareHint("En PC: descarga y comparte desde tu celular.");
        }
        return;
    }
    try{
        await navigator.share({
            files:[file],
            title:"Mi imagen de campaña",
            text:"Historia de Instagram"
        });
        if (device === "android" || device === "ios") {
            setShareHint("Selecciona Instagram en el panel para publicarla en Stories.");
        }
    }catch(err){
        console.error(err);
    }
}

function compartirFacebook(){
    const url = encodeURIComponent(window.location.href);
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, "_blank", "noopener,noreferrer");
}

function ajustarTexto(){
    const contenedor = document.querySelector(".contenedor");
    if (!contenedor) return;
    const ancho = contenedor.clientWidth;
    let size = Math.max(24, Math.min(72, Math.round(ancho * 0.10)));
    const texto = document.getElementById("nombreTexto");
    const len = texto ? texto.innerText.trim().length : 0;
    let top = 19;
    if (len > 12) {
        const factor = Math.max(0.6, 12 / len);
        size = Math.max(18, Math.round(size * factor));
        const extra = Math.min(4, Math.round((1 - factor) * 10));
        top = 19 + extra;
    }
    contenedor.style.setProperty("--name-size", size + "px");
    contenedor.style.setProperty("--name-top", top + "%");
}

function activarDestello(){
    const destello = document.getElementById("destello");
    if (!destello) return;
    destello.style.opacity = "1";
    setTimeout(()=>{ destello.style.opacity = "0"; }, 350);
}

function animarTexto(){
    const el = document.getElementById("nombreTexto");
    if (!el) return;
    el.classList.remove("animar");
    void el.offsetWidth;
    el.classList.add("animar");
}

function incrementarDescargas(){
    const key = "descargasCampana";
    const actual = Number(localStorage.getItem(key) || "0") + 1;
    localStorage.setItem(key, String(actual));
    const label = document.getElementById("downloadCount");
    if (label) label.textContent = String(actual);
}

function cargarDescargas(){
    const key = "descargasCampana";
    const actual = Number(localStorage.getItem(key) || "0");
    const label = document.getElementById("downloadCount");
    if (label) label.textContent = String(actual);
}

function habilitarDescarga(habilitar){
    const btn = document.getElementById("btnDescargar");
    if (!btn) return;
    btn.disabled = !habilitar;
}

window.addEventListener("resize", ajustarTexto);
window.addEventListener("load", ajustarTexto);
window.addEventListener("load", cargarDescargas);
window.addEventListener("load", ()=>habilitarDescarga(false));
ajustarTexto();

</script>

</body>
</html>
